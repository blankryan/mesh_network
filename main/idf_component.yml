# ILI9488 over SPI is provided by this managed component. v1.1.0+ adds
# ESP-IDF v6.0 compatibility (rgb_ele_order API). It is fetched automatically
# by the component manager on the first build.
#
# Only the GATEWAY build needs it, so it is gated to the gateway target
# (esp32s3); the worker build (esp32) skips the download/compile entirely.
dependencies:
  idf:
    version: ">=6.0.0"
  atanisoft/esp_lcd_ili9488:
    version: "^1.1.1"
    rules:
      - if: "target == esp32s3"
